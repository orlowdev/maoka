<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
	<title id="title">Maoka favicon</title>
	<defs>
		<linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#fffaf7" />
			<stop offset="58%" stop-color="#faf7ff" />
			<stop offset="100%" stop-color="#f4fbff" />
		</linearGradient>
		<radialGradient id="hotGlow" cx="18%" cy="12%" r="38%">
			<stop offset="0%" stop-color="#ff3d8b" stop-opacity="0.28" />
			<stop offset="100%" stop-color="#ff3d8b" stop-opacity="0" />
		</radialGradient>
		<radialGradient id="aquaGlow" cx="84%" cy="14%" r="34%">
			<stop offset="0%" stop-color="#00c2ff" stop-opacity="0.24" />
			<stop offset="100%" stop-color="#00c2ff" stop-opacity="0" />
		</radialGradient>
		<pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse">
			<circle cx="1" cy="1" r="0.9" fill="#15122a" fill-opacity="0.16" />
		</pattern>
	</defs>
	<rect width="64" height="64" rx="16" fill="url(#paper)" />
	<rect width="64" height="64" rx="16" fill="url(#dots)" />
	<rect width="64" height="64" rx="16" fill="url(#hotGlow)" />
	<rect width="64" height="64" rx="16" fill="url(#aquaGlow)" />
	<text x="10" y="43" fill="#15122a" font-family="Inter, 'SF Pro', system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="-2">真</text>
</svg>
